name: Publish Python packages to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-wheels:
    name: Build Linux wheels (py_qubed + py_qubed_meteo)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        package: [py_qubed, py_qubed_meteo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wheel (${{ matrix.package }})
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path ${{ matrix.package }}/Cargo.toml
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.target }}
          path: dist


  test-wheels:
    name: Test wheels
    runs-on: ubuntu-latest
    needs: build-wheels

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and test py_qubed
        run: |
          pip install --upgrade pip
          pip install dist/**/py_qubed*.whl
          python -c "import py_qubed; print('py_qubed OK')"

      - name: Install and test py_qubed_meteo
        run: |
          pip install dist/**/py_qubed_meteo*.whl
          python -c "import py_qubed_meteo; print('py_qubed_meteo OK')"


  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test-wheels

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install maturin
          maturin upload dist/**/*
