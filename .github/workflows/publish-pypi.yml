name: Publish Python packages to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-wheels:
    name: Build ${{ matrix.package }} (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        package: [py_qubed, py_qubed_meteo]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: auto
          args: >
            --release
            --manifest-path ${{ matrix.package }}/Cargo.toml
            --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.target }}
          path: dist/*.whl

  test-wheels:
    name: Test x86_64 wheels
    runs-on: ubuntu-latest
    needs: build-wheels

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show downloaded wheels
        run: find dist -name '*.whl' | sort

      - name: Install and test py_qubed
        run: |
          WHEEL=$(find dist -name 'qubed-*.whl' | grep x86_64 | head -n1)
          echo "Installing $WHEEL"
          pip install "$WHEEL"
          python -c "import qubed; print('qubed OK')"

      - name: Install and test py_qubed_meteo
        run: |
          WHEEL=$(find dist -name 'qubed_meteo-*.whl' | grep x86_64 | head -n1)
          echo "Installing $WHEEL"
          pip install "$WHEEL"
          python -c "import qubed_meteo; print('qubed_meteo OK')"

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test-wheels

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: List wheels
        run: find dist -name '*.whl' | sort

      - name: Publish to PyPI
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          find dist -name '*.whl' -print0 | xargs -0 maturin upload
