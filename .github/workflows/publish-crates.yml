name: Publish crates

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test qubed
        run: cargo test -p qubed

      - name: Test qubed_meteo
        run: cargo test --manifest-path qubed_meteo/qubed_meteo/Cargo.toml

  publish:
    runs-on: ubuntu-24.04
    environment: crates-io
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish qubed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p qubed

      - name: Wait for crates.io index
        run: sleep 30
      
      - name: Publish qubed_meteo
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path qubed_meteo/qubed_meteo/Cargo.toml