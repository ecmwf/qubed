[package]
name = "qubed_meteo"
version = "0.1.0"
edition = "2024"

[dependencies]
qubed = { path = "../qubed" }
serde = "1.0.228"
serde_json = "1.0.145"
rsfdb = { git = "https://github.com/ecmwf/rsfdb" }
clap = { version = "4", features = ["derive", "env"] }
chrono = "0.4"
reqwest = { version = "0.12", features = ["blocking", "json"] }

[lib]
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "fdb_db_reader"
path = "bin/fdb_db_reader.rs"

[[bin]]
name = "fdb_scanner"
path = "bin/fdb_scanner.rs"

[patch.'https://github.com/ecmwf/rsfdb']
rsfdb = { path = "../rsfdb" }

[patch.'https://github.com/ecmwf-projects/rsfindlibs']
rsfindlibs = { path = "../rsfindlibs" }

