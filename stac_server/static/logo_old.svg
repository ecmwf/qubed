<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009DEB;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0073E6;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0073E6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2F3842;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2F3842;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0073E6;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="dataFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#FF6B9D;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF6B9D;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glowGrad">
      <stop offset="0%" style="stop-color:#009DEB;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#009DEB;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="centerGlow">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#0073E6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#009DEB;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <circle cx="50" cy="50" r="48" fill="url(#centerGlow)" opacity="0.3"/>

  <!-- Main datacube - isometric view -->
  <!-- Top face -->
  <path d="M 50 28 L 70 39 L 50 50 L 30 39 Z"
        fill="url(#topFace)"
        stroke="#009DEB"
        stroke-width="2"
        stroke-linejoin="round"
        filter="url(#softGlow)"/>

  <!-- Right face -->
  <path d="M 70 39 L 70 61 L 50 72 L 50 50 Z"
        fill="url(#rightFace)"
        stroke="#0073E6"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Left face -->
  <path d="M 30 39 L 30 61 L 50 72 L 50 50 Z"
        fill="url(#leftFace)"
        stroke="#2F3842"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Data layer slices (showing multi-dimensional structure) -->
  <!-- Right face layers -->
  <line x1="50" y1="55" x2="70" y2="44" stroke="#F6F9FC" stroke-width="1.5" opacity="0.6" stroke-dasharray="2,2"/>
  <line x1="50" y1="61" x2="70" y2="50" stroke="#F6F9FC" stroke-width="1.5" opacity="0.5" stroke-dasharray="2,2"/>
  <line x1="50" y1="67" x2="70" y2="56" stroke="#F6F9FC" stroke-width="1.5" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Left face layers -->
  <line x1="50" y1="55" x2="30" y2="44" stroke="#F6F9FC" stroke-width="1.2" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="50" y1="61" x2="30" y2="50" stroke="#F6F9FC" stroke-width="1.2" opacity="0.3" stroke-dasharray="2,2"/>

  <!-- Technical grid overlay on top face -->
  <line x1="50" y1="28" x2="50" y2="50" stroke="#0073E6" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="33.5" x2="60" y2="44.5" stroke="#0073E6" stroke-width="0.5" opacity="0.3"/>
  <line x1="60" y1="33.5" x2="40" y2="44.5" stroke="#0073E6" stroke-width="0.5" opacity="0.3"/>

  <!-- Active selection frame -->
  <rect x="26" y="35" width="48" height="41"
        fill="none"
        stroke="#009DEB"
        stroke-width="1"
        opacity="0.3"
        stroke-dasharray="5,3"
        rx="1"/>

  <!-- Data flow indicators (showing browsable paths) -->
  <line x1="70" y1="44" x2="70" y2="56" stroke="url(#dataFlow)" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="39" x2="60" y2="39" stroke="url(#dataFlow)" stroke-width="1.5" opacity="0.4"/>

  <!-- Scanning line effect (high-tech element) -->
  <line x1="30" y1="45" x2="70" y2="55" stroke="#FF6B9D" stroke-width="0.8" opacity="0.2" stroke-dasharray="1,3"/>
  <line x1="30" y1="55" x2="70" y2="45" stroke="#0073E6" stroke-width="0.8" opacity="0.2" stroke-dasharray="1,3"/>
</svg>
